<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Recorder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-area:hover {
            background: #f0f0f0;
            border-color: #764ba2;
        }
        
        .upload-area.dragover {
            background: #e8eaf6;
            border-color: #667eea;
        }
        
        .upload-area input[type="file"] {
            display: none;
        }
        
        .upload-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .upload-text {
            color: #666;
            margin-bottom: 10px;
        }
        
        .upload-help {
            font-size: 0.9em;
            color: #999;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }
        
        input[type="text"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-danger {
            background: #ff6b6b;
            color: white;
        }
        
        .btn-danger:hover {
            background: #ee5a5a;
        }
        
        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .expenses-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .expenses-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        
        .expenses-table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        
        .expenses-table tr:hover {
            background: #f5f5f5;
        }
        
        .expenses-table .amount {
            text-align: right;
            font-weight: 600;
            color: #667eea;
        }
        
        .edit-btn, .delete-btn {
            padding: 5px 10px;
            font-size: 0.9em;
            margin-right: 5px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        
        .edit-btn {
            background: #4CAF50;
            color: white;
        }
        
        .delete-btn {
            background: #f44336;
            color: white;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .summary-card .category {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        
        .summary-card .amount {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .summary-card .count {
            font-size: 0.8em;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            margin: 0;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
        }
        
        .close-btn:hover {
            color: #333;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }
        
        .tab {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .full-width {
                grid-column: 1;
            }
            
            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Expense Recorder</h1>
            <p>Capture receipts and generate professional expense reports</p>
        </header>
        
        <div class="main-content">
            <!-- Upload Section -->
            <div class="card">
                <h2>📸 Upload Receipt</h2>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">Click to upload or drag & drop</div>
                    <div class="upload-help">PNG, JPG, GIF or BMP (Max 10MB)</div>
                    <input type="file" id="fileInput" accept="image/*">
                </div>
                <div id="uploadStatus"></div>
            </div>
            
            <!-- Manual Entry Section -->
            <div class="card">
                <h2>✏️ Add Expense</h2>
                <form id="expenseForm">
                    <div class="form-group">
                        <label for="vendor">Vendor/Store Name</label>
                        <input type="text" id="vendor" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="amount">Amount (£)</label>
                        <input type="number" id="amount" step="0.01" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">Select a category</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Description (Optional)</label>
                        <textarea id="description"></textarea>
                    </div>
                    
                    <div class="button-group">
                        <button type="submit" class="btn-primary">Add Expense</button>
                        <button type="reset" class="btn-secondary">Clear</button>
                    </div>
                </form>
            </div>
            
            <!-- Summary Section -->
            <div class="card full-width">
                <h2>📊 Summary by Category</h2>
                <div id="summarGrid" class="summary-grid"></div>
            </div>
            
            <!-- Expenses List Section -->
            <div class="card full-width">
                <h2>📋 Expenses</h2>
                <div class="tabs">
                    <button class="tab active" data-tab="list">List</button>
                    <button class="tab" data-tab="report">Generate Report</button>
                </div>
                
                <div class="tab-content active" data-tab="list">
                    <table class="expenses-table" id="expensesTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Vendor</th>
                                <th>Category</th>
                                <th>Description</th>
                                <th>Amount</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="expensesList">
                        </tbody>
                    </table>
                </div>
                
                <div class="tab-content" data-tab="report">
                    <div class="form-group">
                        <label for="reportTitle">Report Title</label>
                        <input type="text" id="reportTitle" value="Business Expense Report">
                    </div>
                    <div class="form-group">
                        <label for="preparer">Prepared By (Optional)</label>
                        <input type="text" id="preparer">
                    </div>
                    <div class="form-group">
                        <label for="invoiceNumber">Invoice/Reference Number (Optional)</label>
                        <input type="text" id="invoiceNumber">
                    </div>
                    <button id="generateBtn" class="btn-primary" style="width: 100%;">📄 Generate & Download PDF</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Expense</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                
                <div class="form-group">
                    <label for="editVendor">Vendor/Store Name</label>
                    <input type="text" id="editVendor" required>
                </div>
                
                <div class="form-group">
                    <label for="editAmount">Amount ($)</label>
                    <input type="number" id="editAmount" step="0.01" required>
                </div>
                
                <div class="form-group">
                    <label for="editDate">Date</label>
                    <input type="date" id="editDate" required>
                </div>
                
                <div class="form-group">
                    <label for="editCategory">Category</label>
                    <select id="editCategory" required>
                        <option value="">Select a category</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="editDescription">Description</label>
                    <textarea id="editDescription"></textarea>
                </div>
                
                <div class="button-group">
                    <button type="submit" class="btn-primary">Save Changes</button>
                    <button type="button" class="btn-secondary" id="cancelEdit">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // Initialize
        const categories = [
            'Accommodation',
            'Transportation',
            'Meals',
            'Internet/Communications',
            'Office Supplies',
            'Entertainment/Client Meeting',
            'Other'
        ];
        
        // Set today's date as default
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').value = today;
        document.getElementById('editDate').value = today;
        
        // Populate category dropdowns
        function populateCategories() {
            const categorySelects = document.querySelectorAll('#category, #editCategory');
            categorySelects.forEach(select => {
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    select.appendChild(option);
                });
            });
        }
        
        populateCategories();
        
        // Upload area handlers
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileUpload(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileUpload(e.target.files[0]);
            }
        });
        
        async function handleFileUpload(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Populate form with extracted data
                    document.getElementById('vendor').value = result.vendor || '';
                    document.getElementById('amount').value = result.amount || '';
                    document.getElementById('date').value = result.date || today;
                    
                    statusDiv.innerHTML = '<div class="alert alert-success">✓ Receipt processed successfully!</div>';
                    
                    // Scroll to form
                    document.getElementById('expenseForm').scrollIntoView({ behavior: 'smooth' });
                } else {
                    statusDiv.innerHTML = `<div class="alert alert-error">✗ ${result.error}</div>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="alert alert-error">✗ Error: ${error.message}</div>`;
            }
        }
        
        // Form submission
        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                vendor: document.getElementById('vendor').value,
                amount: parseFloat(document.getElementById('amount').value),
                date: document.getElementById('date').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                filepath: '',
                raw_text: ''
            };
            
            try {
                const response = await fetch('/api/expenses', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('expenseForm').reset();
                    document.getElementById('date').value = today;
                    document.getElementById('uploadStatus').innerHTML = '<div class="alert alert-success">✓ Expense added successfully!</div>';
                    
                    // Reload expenses
                    loadExpenses();
                    loadSummary();
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
        
        // Load expenses
        async function loadExpenses() {
            try {
                const response = await fetch('/api/expenses');
                const expenses = await response.json();
                
                const tbody = document.getElementById('expensesList');
                tbody.innerHTML = '';
                
                if (expenses.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">No expenses recorded yet</td></tr>';
                    return;
                }
                
                expenses.forEach(expense => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${expense.date}</td>
                        <td>${expense.vendor}</td>
                        <td>${expense.category}</td>
                        <td>${expense.description || '-'}</td>
                        <td class="amount">£${expense.amount.toFixed(2)}</td>
                        <td>
                            <button class="edit-btn" onclick="editExpense(${expense.id})">Edit</button>
                            <button class="delete-btn" onclick="deleteExpense(${expense.id})">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('Error loading expenses:', error);
            }
        }
        
        // Load summary
        async function loadSummary() {
            try {
                const response = await fetch('/api/summary');
                const summary = await response.json();
                
                const grid = document.getElementById('summarGrid');
                grid.innerHTML = '';
                
                if (summary.length === 0) {
                    grid.innerHTML = '<p style="color: #999;">No expenses yet</p>';
                    return;
                }
                
                summary.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'summary-card';
                    card.innerHTML = `
                        <div class="category">${item.category}</div>
                        <div class="amount">£${item.total.toFixed(2)}</div>
                        <div class="count">${item.count} expense${item.count !== 1 ? 's' : ''}</div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading summary:', error);
            }
        }
        
        // Edit expense
        function editExpense(id) {
            fetch(`/api/expenses/${id}`)
                .then(() => loadExpenses())
                .catch(() => {
                    // Find the expense in the table and populate the form
                    const rows = document.querySelectorAll('#expensesList tr');
                    rows.forEach(row => {
                        if (row.querySelector('.edit-btn')?.onclick?.toString().includes(id)) {
                            const cells = row.querySelectorAll('td');
                            document.getElementById('editId').value = id;
                            document.getElementById('editDate').value = cells[0].textContent;
                            document.getElementById('editVendor').value = cells[1].textContent;
                            document.getElementById('editCategory').value = cells[2].textContent;
                            document.getElementById('editDescription').value = cells[3].textContent === '-' ? '' : cells[3].textContent;
                            document.getElementById('editAmount').value = cells[4].textContent.replace('$', '');
                            
                            document.getElementById('editModal').classList.add('active');
                        }
                    });
                });
        }
        
        // Better approach - get expense and populate form
        async function editExpense(id) {
            try {
                const response = await fetch('/api/expenses');
                const expenses = await response.json();
                const expense = expenses.find(e => e.id === id);
                
                if (expense) {
                    document.getElementById('editId').value = id;
                    document.getElementById('editDate').value = expense.date;
                    document.getElementById('editVendor').value = expense.vendor;
                    document.getElementById('editCategory').value = expense.category;
                    document.getElementById('editDescription').value = expense.description || '';
                    document.getElementById('editAmount').value = expense.amount;
                    
                    document.getElementById('editModal').classList.add('active');
                }
            } catch (error) {
                alert('Error loading expense: ' + error.message);
            }
        }
        
        // Delete expense
        async function deleteExpense(id) {
            if (!confirm('Are you sure you want to delete this expense?')) return;
            
            try {
                const response = await fetch(`/api/expenses/${id}`, { method: 'DELETE' });
                const result = await response.json();
                
                if (result.success) {
                    loadExpenses();
                    loadSummary();
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        // Edit form submission
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('editId').value;
            const data = {
                vendor: document.getElementById('editVendor').value,
                amount: parseFloat(document.getElementById('editAmount').value),
                date: document.getElementById('editDate').value,
                category: document.getElementById('editCategory').value,
                description: document.getElementById('editDescription').value
            };
            
            try {
                const response = await fetch(`/api/expenses/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('editModal').classList.remove('active');
                    loadExpenses();
                    loadSummary();
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
        
        // Close modal
        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('editModal').classList.remove('active');
        });
        
        document.getElementById('cancelEdit').addEventListener('click', () => {
            document.getElementById('editModal').classList.remove('active');
        });
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                
                // Remove active from all tabs and contents
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                // Add active to clicked tab and corresponding content
                tab.classList.add('active');
                document.querySelector(`.tab-content[data-tab="${tabName}"]`).classList.add('active');
            });
        });
        
        // Generate report
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const data = {
                title: document.getElementById('reportTitle').value,
                preparer: document.getElementById('preparer').value,
                invoice_number: document.getElementById('invoiceNumber').value
            };
            
            try {
                const response = await fetch('/api/report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'expense_report.pdf';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();
                } else {
                    alert('Error generating report');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
        
        // Initial load
        loadExpenses();
        loadSummary();
        
        // Reload every 30 seconds
        setInterval(() => {
            loadExpenses();
            loadSummary();
        }, 30000);
    </script>
</body>
